name: Build Java Jar and Publish Artifact

on:
  workflow_run:
    workflows:
      - Pre-build Workflow
    types:
      - completed

  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compile Java sources
        run: |
          javac SampleDemo.java

      - name: Create runnable JAR
        run: |
          jar cfm SampleDemo.jar manifest.txt SampleDemo.class

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-demo-jar
          path: SampleDemo.jar
